<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>본사 - 기아 순정 액세서리 설치 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .status-badge-adjusting    { background:#fef3c7; color:#d97706; }
        .status-badge-assigned     { background:#dbeafe; color:#2563eb; }
        .status-badge-in_progress  { background:#ede9fe; color:#7c3aed; }
        .status-badge-inst_confirmed { background:#ffedd5; color:#ea580c; }
        .status-badge-completed    { background:#dcfce7; color:#16a34a; }
        input:focus, select:focus, textarea:focus { outline:none; box-shadow:0 0 0 3px rgba(59,130,246,.25); }
        #editModal { display:none; position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.45); align-items:center; justify-content:center; }
        #editModal.open { display:flex; }
        #categoryModal { display:none; position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.45); align-items:center; justify-content:center; }
        #categoryModal.open { display:flex; }
    </style>
</head>
<body class="bg-gray-50">
<div class="min-h-screen">
    <header class="bg-gradient-to-r from-blue-700 to-blue-900 text-white py-5 shadow-lg">
        <div class="container mx-auto px-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <img src="/static/kvan-logo.png" alt="K-VAN" class="h-11 bg-white px-3 py-1 rounded-lg">
                <div>
                    <h1 class="text-2xl font-bold"><i class="fas fa-building mr-2"></i>본사 접수 관리 시스템</h1>
                    <p class="text-blue-200 text-sm mt-0.5">고객 접수 등록 및 지사 배정</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span id="userInfo" class="text-blue-200 text-sm"></span>
                <a href="/static/launcher" class="bg-white text-blue-700 px-4 py-2 rounded-lg hover:bg-blue-50 font-semibold text-sm">
                    <i class="fas fa-home mr-1"></i>메인
                </a>
            </div>
        </div>
    </header>
    <div class="container mx-auto px-4 mt-6">
        <div class="bg-white rounded-xl shadow-sm mb-6 flex border-b overflow-hidden">
            <button onclick="showTab('register')" id="tab-register" class="flex-1 px-6 py-4 font-semibold text-blue-600 border-b-2 border-blue-600 transition"><i class="fas fa-plus-circle mr-2"></i>신규 접수 등록</button>
            <button onclick="showTab('list')" id="tab-list" class="flex-1 px-6 py-4 font-semibold text-gray-500 hover:text-blue-600 transition"><i class="fas fa-list mr-2"></i>접수 현황</button>
            <button onclick="showTab('dashboard')" id="tab-dashboard" class="flex-1 px-6 py-4 font-semibold text-gray-500 hover:text-blue-600 transition"><i class="fas fa-chart-bar mr-2"></i>통계 대시보드</button>
            <button onclick="showTab('prices')" id="tab-prices" class="flex-1 px-6 py-4 font-semibold text-gray-500 hover:text-blue-600 transition"><i class="fas fa-box-open mr-2"></i>제품 관리</button>
        </div>
        <div id="content-register" class="bg-white rounded-xl shadow-sm p-8">
            <h2 class="text-xl font-bold text-gray-800 mb-6"><i class="fas fa-file-alt text-blue-600 mr-2"></i>신규 접수 등록</h2>
            <form id="assignmentForm" class="space-y-5" autocomplete="off">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div><label class="block text-gray-700 font-semibold mb-1.5"><i class="fas fa-calendar-alt text-blue-500 mr-1.5"></i>접수 일자 *</label><input type="date" id="orderDate" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg"></div>
                    <div><label class="block text-gray-700 font-semibold mb-1.5"><i class="fas fa-building text-blue-500 mr-1.5"></i>담당 지사 *</label><select id="branchId" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg"><option value="">지사를 선택하세요</option></select></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div><label class="block text-gray-700 font-semibold mb-1.5"><i class="fas fa-user text-blue-500 mr-1.5"></i>주문자명 *</label><input type="text" id="customerName" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg" placeholder="고객 이름을 입력하세요"></div>
                    <div><label class="block text-gray-700 font-semibold mb-1.5"><i class="fas fa-phone text-blue-500 mr-1.5"></i>연락처 *</label><input type="tel" id="phone" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg" placeholder="010-0000-0000"></div>
                </div>
                <div><label class="block text-gray-700 font-semibold mb-1.5"><i class="fas fa-map-marker-alt text-blue-500 mr-1.5"></i>고객 주소 *</label><input type="text" id="address" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg" placeholder="설치 주소를 입력하세요"></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div><label class="block text-gray-700 font-semibold mb-1.5"><i class="fas fa-box text-blue-500 mr-1.5"></i>상품명</label><input type="text" id="productName" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg" placeholder="예: PV5 스마트패키지"></div>
                    <div><label class="block text-gray-700 font-semibold mb-1.5"><i class="fas fa-sticky-note text-blue-500 mr-1.5"></i>메모</label><input type="text" id="notes" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg" placeholder="특이사항을 입력하세요"></div>
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="submit" id="submitBtn" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition shadow"><i class="fas fa-paper-plane mr-2"></i>접수 등록</button>
                    <button type="button" onclick="resetForm()" class="px-6 py-3 border border-gray-300 rounded-lg hover:bg-gray-50 font-semibold transition"><i class="fas fa-redo mr-2"></i>초기화</button>
                </div>
            </form>
            <div id="successMessage" class="hidden mt-5 p-4 bg-green-50 border border-green-200 text-green-700 rounded-lg flex items-center gap-2"><i class="fas fa-check-circle text-xl"></i><span id="successText"></span></div>
            <div id="errorMessage" class="hidden mt-5 p-4 bg-red-50 border border-red-200 text-red-600 rounded-lg flex items-center gap-2"><i class="fas fa-exclamation-circle text-xl"></i><span id="errorText"></span></div>
        </div>
        <div id="content-list" class="hidden bg-white rounded-xl shadow-sm p-8">
            <div class="flex items-center justify-between mb-6"><h2 class="text-xl font-bold text-gray-800"><i class="fas fa-clipboard-list text-blue-600 mr-2"></i>전체 접수 현황</h2><button onclick="loadAssignments()" class="text-sm text-blue-600 hover:underline"><i class="fas fa-sync-alt mr-1"></i>새로고침</button></div>
            <div class="mb-5 flex flex-wrap gap-3">
                <select id="filterBranch" onchange="loadAssignments()" class="px-4 py-2 border border-gray-300 rounded-lg text-sm"><option value="">전체 지사</option></select>
                <select id="filterStatus" onchange="loadAssignments()" class="px-4 py-2 border border-gray-300 rounded-lg text-sm"><option value="">전체 상태</option><option value="adjusting">조율 중</option><option value="assigned">예약 접수 중</option><option value="in_progress">예약 확정</option><option value="inst_confirmed">시공 확정</option><option value="completed">시공 완료</option></select>
            </div>
            <div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="bg-gray-50 border-b text-gray-600"><th class="px-4 py-3 text-left font-semibold">접수일자</th><th class="px-4 py-3 text-center font-semibold">상태</th><th class="px-4 py-3 text-left font-semibold">주문자명</th><th class="px-4 py-3 text-left font-semibold">연락처</th><th class="px-4 py-3 text-left font-semibold">주소</th><th class="px-4 py-3 text-left font-semibold">상품명</th><th class="px-4 py-3 text-left font-semibold">담당 지사</th><th class="px-4 py-3 text-left font-semibold">메모</th><th class="px-4 py-3 text-center font-semibold">관리</th></tr></thead><tbody id="assignmentList"><tr><td colspan="8" class="text-center py-10 text-gray-400">로딩 중...</td></tr></tbody></table></div>
        </div>
        <div id="content-dashboard" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-6">
                <div class="bg-white rounded-xl shadow-sm p-6 flex items-center justify-between"><div><div class="text-gray-500 text-sm">전체 접수</div><div class="text-3xl font-bold text-blue-600 mt-1" id="statTotal">0</div></div><i class="fas fa-clipboard-list text-blue-300 text-4xl"></i></div>
                <div class="bg-white rounded-xl shadow-sm p-6 flex items-center justify-between"><div><div class="text-gray-500 text-sm">진행 중</div><div class="text-3xl font-bold text-yellow-600 mt-1" id="statInProgress">0</div></div><i class="fas fa-spinner text-yellow-300 text-4xl"></i></div>
                <div class="bg-white rounded-xl shadow-sm p-6 flex items-center justify-between"><div><div class="text-gray-500 text-sm">완료</div><div class="text-3xl font-bold text-green-600 mt-1" id="statCompleted">0</div></div><i class="fas fa-check-circle text-green-300 text-4xl"></i></div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-8"><h3 class="text-lg font-bold text-gray-800 mb-5"><i class="fas fa-building text-blue-600 mr-2"></i>지사별 현황</h3><div id="branchStats" class="space-y-4"></div></div>
        </div>
        <div id="content-prices" class="hidden space-y-6">
            <div class="bg-white rounded-xl shadow-sm p-8">
                <h2 class="text-xl font-bold text-gray-800 mb-5"><i class="fas fa-plus-circle text-green-600 mr-2"></i>신규 제품 등록 <span class="ml-2 text-sm font-normal text-gray-500">본사 전용 · 등록 즉시 전 지사 2단계 반영</span></h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">카테고리 *</label>
                        <div class="flex gap-2">
                            <select id="np-brand-select" onchange="onBrandSelectChange()" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm"><option value="">-- 카테고리 선택 --</option></select>
                            <button onclick="openCategoryModal()" class="px-3 py-2 bg-purple-100 text-purple-700 rounded-lg text-sm font-semibold hover:bg-purple-200 transition whitespace-nowrap"><i class="fas fa-folder-plus mr-1"></i>카테고리 관리</button>
                        </div>
                        <input id="np-brand" type="hidden" value="">
                    </div>
                    <div><label class="block text-sm font-semibold text-gray-700 mb-1">제품명 *</label><input id="np-name" type="text" placeholder="PV5 기아 워크스페이스" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
                    <div><label class="block text-sm font-semibold text-gray-700 mb-1">소비자가 (원) *</label><input id="np-price" type="number" placeholder="1760000" min="0" step="1000" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">제품 이미지 <span class="text-xs text-gray-400">(선택)</span></label>
                        <div class="flex items-center gap-2">
                            <label class="flex-1 flex items-center gap-2 px-3 py-2 border border-gray-300 rounded-lg text-sm cursor-pointer hover:bg-gray-50 transition"><i class="fas fa-upload text-gray-400"></i><span id="np-image-label" class="text-gray-400 truncate">이미지 파일 선택</span><input id="np-image-file" type="file" accept="image/*" class="hidden" onchange="previewProductImage(this)"></label>
                            <div id="np-image-preview-wrap" class="hidden"><img id="np-image-preview" src="" alt="미리보기" class="w-12 h-12 object-cover rounded-lg border border-gray-200"></div>
                        </div>
                        <p id="np-image-status" class="mt-1 text-xs text-gray-400 hidden"></p>
                        <input id="np-image-url" type="hidden" value="">
                    </div>
                    <div class="md:col-span-2"><label class="block text-sm font-semibold text-gray-700 mb-1">구성 설명</label><input id="np-desc" type="text" placeholder="격벽타공판 + 워크스페이스" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
                    <div class="md:col-span-2">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="np-multi-select" class="w-4 h-4 rounded">
                            <span class="text-sm font-semibold text-gray-700"><i class="fas fa-layer-group text-blue-500 mr-1"></i>중복 선택 허용 (지사 2단계에서 여러 개 동시 선택 가능)</span>
                        </label>
                    </div>
                </div>
                <div class="mt-4 flex justify-end"><button onclick="registerPackage()" class="px-6 py-2.5 bg-green-600 text-white rounded-lg font-semibold hover:bg-green-700 transition text-sm"><i class="fas fa-plus mr-1"></i>제품 등록</button></div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-8">
                <div class="flex items-center justify-between mb-5">
                    <h2 class="text-xl font-bold text-gray-800"><i class="fas fa-box-open text-blue-600 mr-2"></i>전체 제품 관리 <span class="ml-2 text-sm font-normal text-gray-500">가격 수정 · 표시/숨김 · 삭제</span></h2>
                    <button onclick="loadProductManagement()" class="px-3 py-1.5 bg-gray-100 text-gray-600 rounded-lg text-sm hover:bg-gray-200 transition"><i class="fas fa-sync-alt mr-1"></i>새로고침</button>
                </div>
                <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 mb-5 text-sm text-blue-700"><i class="fas fa-info-circle mr-1"></i>가격 수정 후 <strong>저장</strong>하면 즉시 전 지사 2단계에 반영됩니다. 커스텀 제품만 삭제 가능합니다.</div>
                <div id="productTablesContainer" class="space-y-8"><div class="text-center py-8 text-gray-400"><i class="fas fa-spinner fa-spin mr-2"></i>로딩 중...</div></div>
                <div class="mt-8 bg-gray-50 rounded-xl p-5"><h3 class="text-sm font-bold text-gray-600 mb-3"><i class="fas fa-history mr-1"></i>최근 가격 변경 이력</h3><div id="priceHistory" class="text-xs text-gray-500 space-y-1"><p>로딩 중...</p></div></div>
            </div>
        </div>
    </div>
</div><!-- 수정 모달 -->
<div id="editModal">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 p-8">
    <h3 class="text-xl font-bold text-gray-800 mb-6"><i class="fas fa-edit text-blue-600 mr-2"></i>접수 정보 수정</h3>
    <div class="space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-gray-700 font-semibold mb-1 text-sm">접수일자</label><input type="date" id="editOrderDate" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
        <div><label class="block text-gray-700 font-semibold mb-1 text-sm">담당 지사 *</label><select id="editBranchId" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"><option value="">지사 선택</option></select></div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-gray-700 font-semibold mb-1 text-sm">주문자명 *</label><input type="text" id="editCustomerName" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" placeholder="고객 이름"></div>
        <div><label class="block text-gray-700 font-semibold mb-1 text-sm">연락처</label><input type="tel" id="editPhone" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" placeholder="010-0000-0000"></div>
      </div>
      <div><label class="block text-gray-700 font-semibold mb-1 text-sm">주소</label><input type="text" id="editAddress" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" placeholder="설치 주소"></div>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-gray-700 font-semibold mb-1 text-sm">상품명</label><input type="text" id="editProductName" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" placeholder="상품명"></div>
        <div><label class="block text-gray-700 font-semibold mb-1 text-sm">메모</label><input type="text" id="editNotes" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" placeholder="특이사항"></div>
      </div>
    </div>
    <div class="flex gap-3 mt-6">
      <button onclick="submitEditAssignment()" class="flex-1 bg-blue-600 text-white py-2.5 rounded-lg font-bold hover:bg-blue-700 transition"><i class="fas fa-save mr-2"></i>저장</button>
      <button onclick="closeEditModal()" class="px-6 py-2.5 border border-gray-300 rounded-lg hover:bg-gray-50 font-semibold transition">취소</button>
    </div>
  </div>
</div>

<!-- 카테고리 관리 모달 -->
<div id="categoryModal">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 p-8">
    <h3 class="text-xl font-bold text-gray-800 mb-6"><i class="fas fa-folder-open text-purple-600 mr-2"></i>카테고리 관리</h3>
    <div class="mb-6 p-4 bg-purple-50 rounded-xl border border-purple-200">
      <label class="block text-sm font-semibold text-gray-700 mb-2">새 카테고리 추가</label>
      <div class="flex gap-2">
        <input id="newCategoryName" type="text" placeholder="예: 현대 순정형" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm" onkeydown="if(event.key==='Enter') addCategory()">
        <button onclick="addCategory()" class="px-4 py-2 bg-purple-600 text-white rounded-lg text-sm font-semibold hover:bg-purple-700 transition whitespace-nowrap"><i class="fas fa-plus mr-1"></i>추가</button>
      </div>
    </div>
    <div class="mb-6">
      <label class="block text-sm font-semibold text-gray-700 mb-3">현재 카테고리 목록</label>
      <div id="categoryList" class="space-y-2 max-h-64 overflow-y-auto"></div>
    </div>
    <div class="flex justify-end">
      <button onclick="closeCategoryModal()" class="px-6 py-2.5 bg-gray-800 text-white rounded-lg font-semibold hover:bg-gray-900 transition"><i class="fas fa-check mr-2"></i>완료</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
<script>
;(function setupAxiosAuth() {
    const token = localStorage.getItem('token')
    if (!token) { window.location.href = '/static/login'; return }
    axios.defaults.headers.common['Authorization'] = `Bearer ${token}`
    try {
        const user = JSON.parse(localStorage.getItem('user') || '{}')
        const el = document.getElementById('userInfo')
        if (el && user.username) el.textContent = `${user.branchName || ''} - ${user.username}`
    } catch(e) {}
})()

document.addEventListener('DOMContentLoaded', () => {
    const today = new Date().toISOString().split('T')[0]
    document.getElementById('orderDate').value = today
    loadBranches()
    loadCategories()
})

function showTab(tab) {
    ['register','list','dashboard','prices'].forEach(t => {
        document.getElementById(`content-${t}`).classList.add('hidden')
        document.getElementById(`tab-${t}`).classList.remove('text-blue-600','border-b-2','border-blue-600')
        document.getElementById(`tab-${t}`).classList.add('text-gray-500')
    })
    document.getElementById(`content-${tab}`).classList.remove('hidden')
    document.getElementById(`tab-${tab}`).classList.remove('text-gray-500')
    document.getElementById(`tab-${tab}`).classList.add('text-blue-600','border-b-2','border-blue-600')
    if (tab === 'list') loadAssignments()
    else if (tab === 'dashboard') loadDashboard()
    else if (tab === 'prices') loadProductManagement()
}

async function loadBranches() {
    try {
        const res = await axios.get('/api/branches')
        if (res.data.success) {
            const branchSel = document.getElementById('branchId')
            const filterSel = document.getElementById('filterBranch')
            res.data.branches.forEach(b => {
                branchSel.add(new Option(`${b.name} (${b.code})`, b.id))
                filterSel.add(new Option(b.name, b.id))
            })
        }
    } catch(e) { console.error('loadBranches:', e) }
}

document.getElementById('assignmentForm').addEventListener('submit', async (e) => {
    e.preventDefault()
    const btn = document.getElementById('submitBtn')
    btn.disabled = true
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>등록 중...'
    const formData = {
        orderDate: document.getElementById('orderDate').value,
        customerName: document.getElementById('customerName').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        address: document.getElementById('address').value.trim(),
        productName: document.getElementById('productName').value.trim(),
        branchId: parseInt(document.getElementById('branchId').value),
        notes: document.getElementById('notes').value.trim(),
    }
    try {
        const res = await axios.post('/api/assignments', formData)
        if (res.data.success) {
            document.getElementById('successMessage').classList.remove('hidden')
            document.getElementById('successText').textContent = `✅ 접수 완료! (접수번호: ${res.data.assignmentId})`
            document.getElementById('errorMessage').classList.add('hidden')
            setTimeout(() => { resetForm(); document.getElementById('successMessage').classList.add('hidden') }, 3000)
        }
    } catch(err) {
        document.getElementById('errorMessage').classList.remove('hidden')
        document.getElementById('errorText').textContent = err.response?.data?.error || '접수 등록 중 오류가 발생했습니다.'
        document.getElementById('successMessage').classList.add('hidden')
    } finally {
        btn.disabled = false
        btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i>접수 등록'
    }
})

let editingAssignmentId = null

function openEditModal(a) {
    editingAssignmentId = a.assignment_id
    document.getElementById('editOrderDate').value = a.order_date || ''
    document.getElementById('editCustomerName').value = a.customer_name || ''
    document.getElementById('editPhone').value = a.customer_phone || ''
    document.getElementById('editAddress').value = a.customer_address || ''
    document.getElementById('editProductName').value = a.product_name || ''
    document.getElementById('editNotes').value = a.notes || ''
    const sel = document.getElementById('editBranchId')
    sel.innerHTML = '<option value="">지사 선택</option>'
    document.querySelectorAll('#branchId option').forEach(opt => {
        if (opt.value) sel.add(new Option(opt.text, opt.value, false, String(opt.value) === String(a.branch_id)))
    })
    document.getElementById('editModal').classList.add('open')
}

function closeEditModal() {
    document.getElementById('editModal').classList.remove('open')
    editingAssignmentId = null
}

async function submitEditAssignment() {
    if (!editingAssignmentId) return
    const customerName = document.getElementById('editCustomerName').value.trim()
    const branchId = document.getElementById('editBranchId').value
    if (!customerName || !branchId) { alert('주문자명과 담당 지사는 필수입니다.'); return }
    try {
        const res = await axios.put(`/api/assignments/${editingAssignmentId}`, {
            orderDate: document.getElementById('editOrderDate').value,
            customerName, phone: document.getElementById('editPhone').value.trim(),
            address: document.getElementById('editAddress').value.trim(),
            productName: document.getElementById('editProductName').value.trim(),
            branchId: parseInt(branchId),
            notes: document.getElementById('editNotes').value.trim(),
        })
        if (res.data.success) { closeEditModal(); loadAssignments(); alert('✅ 접수 정보가 수정되었습니다.') }
        else { alert('❌ ' + (res.data.error || '수정 실패')) }
    } catch(e) { alert('❌ ' + (e.response?.data?.error || '수정 중 오류가 발생했습니다.')) }
}

async function deleteAssignment(assignmentId, customerName) {
    if (!confirm(`⚠️ [${customerName}] 접수를 삭제하시겠습니까?\n\n삭제 후 복구할 수 없습니다.`)) return
    try {
        const res = await axios.delete(`/api/assignments/${assignmentId}`)
        if (res.data.success) { loadAssignments(); alert('✅ 접수가 삭제되었습니다.') }
        else { alert('❌ ' + (res.data.error || '삭제 실패')) }
    } catch(e) { alert('❌ ' + (e.response?.data?.error || '삭제 중 오류가 발생했습니다.')) }
}

document.getElementById('editModal').addEventListener('click', function(e) { if (e.target === this) closeEditModal() })

function resetForm() {
    document.getElementById('assignmentForm').reset()
    document.getElementById('orderDate').value = new Date().toISOString().split('T')[0]
}

async function loadAssignments() {
    try {
        const branchId = document.getElementById('filterBranch').value
        const status = document.getElementById('filterStatus').value
        const params = new URLSearchParams()
        if (branchId) params.append('branchId', branchId)
        if (status) params.append('status', status)
        const res = await axios.get(`/api/assignments?${params}`)
        if (!res.data.success) return
        const tbody = document.getElementById('assignmentList')
        const list = res.data.assignments
        if (list.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" class="text-center py-12 text-gray-400"><i class="fas fa-inbox text-4xl block mb-2"></i>접수 내역이 없습니다.</td></tr>`
            return
        }
        const statusLabel = { adjusting:'조율 중', assigned:'예약 접수 중', in_progress:'예약 확정', inst_confirmed:'시공 확정', completed:'시공 완료' }
        const statusClass = { adjusting:'status-badge-adjusting', assigned:'status-badge-assigned', in_progress:'status-badge-in_progress', inst_confirmed:'status-badge-inst_confirmed', completed:'status-badge-completed' }
        tbody.innerHTML = list.map(a => `
            <tr class="border-b hover:bg-gray-50 transition">
                <td class="px-4 py-3 text-gray-700 whitespace-nowrap">${a.order_date || a.assigned_at?.split('T')[0] || '-'}</td>
                <td class="px-4 py-3 text-center"><span class="px-2 py-1 rounded-full text-xs font-semibold whitespace-nowrap ${statusClass[a.status] || ''}">${statusLabel[a.status] || a.status}</span></td>
                <td class="px-4 py-3 font-semibold text-gray-800 whitespace-nowrap">${a.customer_name}</td>
                <td class="px-4 py-3 text-gray-600 whitespace-nowrap">${a.customer_phone || '-'}</td>
                <td class="px-4 py-3 text-gray-600 max-w-xs truncate">${a.customer_address || '-'}</td>
                <td class="px-4 py-3 text-gray-600 whitespace-nowrap">${a.product_name || '-'}</td>
                <td class="px-4 py-3 text-gray-600 whitespace-nowrap">${a.branch_name || '-'}</td>
                <td class="px-4 py-3 text-gray-500 text-xs max-w-xs truncate">${a.notes || '-'}</td>
                <td class="px-4 py-3 text-center whitespace-nowrap">
                    <button onclick="openEditModal(${JSON.stringify(a).replace(/"/g,'&quot;')})" class="text-blue-600 hover:text-blue-800 mr-2"><i class="fas fa-edit"></i></button>
                    <button onclick="deleteAssignment('${a.assignment_id}', '${a.customer_name}')" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                </td>
            </tr>
        `).join('')
    } catch(e) { console.error('loadAssignments:', e) }
}

async function loadDashboard() {
    try {
        const res = await axios.get('/api/assignments')
        if (!res.data.success) return
        const list = res.data.assignments
        document.getElementById('statTotal').textContent = list.length
        document.getElementById('statInProgress').textContent = list.filter(a => ['in_progress','inst_confirmed'].includes(a.status)).length
        document.getElementById('statCompleted').textContent = list.filter(a => a.status === 'completed').length
        const groups = {}
        list.forEach(a => {
            if (!groups[a.branch_name]) groups[a.branch_name] = { adjusting:0, assigned:0, in_progress:0, inst_confirmed:0, completed:0 }
            if (groups[a.branch_name][a.status] !== undefined) groups[a.branch_name][a.status]++
        })
        document.getElementById('branchStats').innerHTML = Object.entries(groups).map(([name, s]) => `
            <div class="border border-gray-200 rounded-lg p-4">
                <h4 class="font-bold text-gray-700 mb-3">${name}</h4>
                <div class="grid grid-cols-5 gap-2 text-center">
                    <div><div class="text-xl font-bold text-yellow-600">${s.adjusting||0}</div><div class="text-xs text-gray-500">조율 중</div></div>
                    <div><div class="text-xl font-bold text-blue-600">${s.assigned||0}</div><div class="text-xs text-gray-500">예약접수</div></div>
                    <div><div class="text-xl font-bold text-purple-600">${s.in_progress||0}</div><div class="text-xs text-gray-500">예약확정</div></div>
                    <div><div class="text-xl font-bold text-orange-600">${s.inst_confirmed||0}</div><div class="text-xs text-gray-500">시공확정</div></div>
                    <div><div class="text-xl font-bold text-green-600">${s.completed||0}</div><div class="text-xs text-gray-500">시공완료</div></div>
                </div>
            </div>
        `).join('')
    } catch(e) { console.error('loadDashboard:', e) }
}

// ── 카테고리 관리 ──────────────────────────────────────────────────────────
const DEFAULT_CATEGORIES = [
    { id: 'ev9', name: 'EV9' },
    { id: 'carnival', name: '카니발(KA4/PE)' },
    { id: 'sorento', name: '쏘렌토(MQ4/PE)' },
    { id: 'sportage', name: '스포티지(NQ5)' },
    { id: 'k8', name: 'K8' },
    { id: 'tasman', name: '타스만(TK)' }
]


function getCategories() {
    try {
        const saved = localStorage.getItem('hq_categories')
        if (!saved) return DEFAULT_CATEGORIES
        const savedCats = JSON.parse(saved)
        // DEFAULT_CATEGORIES에서 없는 항목은 항상 포함 (신규 차종 누락 방지)
        const savedIds = new Set(savedCats.map(c => c.id))
        const merged = [...savedCats]
        DEFAULT_CATEGORIES.forEach(dc => { if (!savedIds.has(dc.id)) merged.push(dc) })
        return merged
    } catch(e) { return DEFAULT_CATEGORIES }
}

function saveCategories(cats) { localStorage.setItem('hq_categories', JSON.stringify(cats)) }

function loadCategories() {
    const cats = getCategories()
    const sel = document.getElementById('np-brand-select')
    sel.innerHTML = '<option value="">-- 카테고리 선택 --</option>'
    cats.forEach(c => sel.add(new Option(c.name, c.id)))
}

function onBrandSelectChange() {
    document.getElementById('np-brand').value = document.getElementById('np-brand-select').value
}

function openCategoryModal() { renderCategoryList(); document.getElementById('categoryModal').classList.add('open') }
function closeCategoryModal() { document.getElementById('categoryModal').classList.remove('open'); loadCategories() }

document.getElementById('categoryModal').addEventListener('click', function(e) { if (e.target === this) closeCategoryModal() })

function getCategoryColor(idx) {
    const colors = ['#ef4444','#3b82f6','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#84cc16']
    return colors[idx % colors.length]
}

function renderCategoryList() {
    const cats = getCategories()
    const container = document.getElementById('categoryList')
    if (cats.length === 0) { container.innerHTML = '<p class="text-sm text-gray-400 text-center py-4">카테고리가 없습니다.</p>'; return }
    container.innerHTML = cats.map((c, idx) => `
        <div class="flex items-center justify-between px-4 py-3 bg-white border border-gray-200 rounded-lg">
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full inline-block" style="background:${getCategoryColor(idx)}"></span>
                <span class="font-semibold text-gray-800 text-sm">${c.name}</span>
                <span class="text-xs text-gray-400">(${c.id})</span>
            </div>
            <button onclick="deleteCategory('${c.id}')" class="text-red-400 hover:text-red-600 transition p-1"><i class="fas fa-trash text-sm"></i></button>
        </div>
    `).join('')
}

function addCategory() {
    const input = document.getElementById('newCategoryName')
    const name = input.value.trim()
    if (!name) { alert('카테고리 이름을 입력해주세요.'); return }
    const cats = getCategories()
    if (cats.find(c => c.name === name)) { alert('같은 이름의 카테고리가 이미 있습니다.'); return }
    cats.push({ id: 'cat-' + Date.now(), name })
    saveCategories(cats)
    input.value = ''
    renderCategoryList()
    alert(`✅ "${name}" 카테고리가 추가되었습니다!`)
}

function deleteCategory(catId) {
    const cats = getCategories()
    const cat = cats.find(c => c.id === catId)
    if (!cat) return
    if (!confirm(`"${cat.name}" 카테고리를 삭제하시겠습니까?`)) return
    saveCategories(cats.filter(c => c.id !== catId))
    renderCategoryList()
    alert(`✅ "${cat.name}" 카테고리가 삭제되었습니다.`)
}

// ── 제품 관리 ──────────────────────────────────────────────────────────────
let allPkgData = [], allCustomPkgs = [], allBasePackages = []

async function loadProductManagement() {
    await Promise.all([loadAllPrices(), loadCustomPackages(), loadBasePackages()])
    renderProductTables()
}

async function loadBasePackages() {
    try { const res = await axios.get('/api/packages'); allBasePackages = res.data.packages || [] } catch(e) {}
}

async function loadAllPrices() {
    try { const res = await axios.get('/api/packages/prices'); allPkgData = res.data.prices || [] } catch(e) {}
}

async function loadCustomPackages() {
    try { const res = await axios.get('/api/custom-packages'); allCustomPkgs = res.data.packages || [] } catch(e) {}
}

function renderProductTables() {
    const container = document.getElementById('productTablesContainer')
    const historyDiv = document.getElementById('priceHistory')
    const customIds = new Set(allCustomPkgs.map(p => p.package_id))
    const priceMap = {}
    allPkgData.forEach(p => { priceMap[p.package_id] = p })

    const customAsPriceItems = allCustomPkgs.map(cp => ({
        package_id: cp.package_id, package_name: cp.name,
        price: priceMap[cp.package_id] ? priceMap[cp.package_id].price : cp.price,
        updated_by: priceMap[cp.package_id] ? priceMap[cp.package_id].updated_by : 'system',
        updated_at: priceMap[cp.package_id] ? priceMap[cp.package_id].updated_at : cp.updated_at,
        brand: cp.brand, is_active: cp.is_active
    }))

    // packages.ts 하드코딩 기본 제품 (DB에 없는 것만 추가)
    const allExistingIds = new Set([...allPkgData.map(p => p.package_id), ...allCustomPkgs.map(p => p.package_id)])
    const basePackageItems = allBasePackages
        .filter(p => !allExistingIds.has(p.id))
        .map(p => ({
            package_id: p.id, package_name: p.name,
            price: p.price,
            updated_by: 'system',
            updated_at: '',
            brand: p.brand, is_active: 1
        }))

    const baseItems = allPkgData.filter(p => !customIds.has(p.package_id))
    const allItems = [...baseItems, ...customAsPriceItems, ...basePackageItems]
    const cats = getCategories()
    const grouped = {}
    cats.forEach(c => { grouped[c.id] = { cat: c, items: [] } })

    allItems.forEach(p => {
        const brand = p.brand || (p.package_id.startsWith('milwaukee') ? 'milwaukee' : p.package_id.startsWith('kia') ? 'kia' : 'other')
        if (grouped[brand]) grouped[brand].items.push(p)
        else { if (!grouped['other']) grouped['other'] = { cat: { id:'other', name:'기타' }, items:[] }; grouped['other'].items.push(p) }
    })

    const colorList = ['#ef4444','#3b82f6','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#84cc16']
    let html = '', catIdx = 0
    Object.values(grouped).forEach(({ cat, items }) => {
        if (items.length === 0) return
        const color = colorList[catIdx++ % colorList.length]
        html += `
        <div class="mb-6">
            <h3 class="text-base font-bold text-gray-700 mb-3 flex items-center gap-2">
                <span class="inline-block w-3 h-3 rounded-full" style="background:${color}"></span>${cat.name}
                <span class="text-xs text-gray-400 font-normal">(${items.length}개)</span>
            </h3>
            <div class="overflow-hidden rounded-xl border border-gray-200">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50"><tr>
                        <th class="text-left px-4 py-3 text-gray-600 font-semibold">제품명</th>
                        <th class="text-right px-4 py-3 text-gray-600 font-semibold w-44">소비자가</th>
                        <th class="text-center px-4 py-3 text-gray-600 font-semibold w-14">표시</th>
                        <th class="text-center px-4 py-3 text-gray-600 font-semibold w-44">관리</th>
                    </tr></thead>
                    <tbody class="divide-y divide-gray-100">${buildRows(items, customIds)}</tbody>
                </table>
            </div>
        </div>`
    })

    container.innerHTML = html || '<div class="text-center py-8 text-gray-400">등록된 제품이 없습니다.</div>'

    const recent = allPkgData.filter(p => p.updated_by && p.updated_by !== 'system').sort((a,b) => new Date(b.updated_at)-new Date(a.updated_at)).slice(0,5)
    historyDiv.innerHTML = recent.length === 0 ? '<p class="text-gray-400">아직 수정 이력이 없습니다.</p>'
        : recent.map(p => `<div class="flex justify-between items-center py-1 border-b border-gray-100 last:border-0"><span class="font-medium text-gray-700">${p.package_name}</span><span class="text-blue-600 font-bold">₩${Number(p.price).toLocaleString('ko-KR')}</span><span class="text-gray-400">${p.updated_by} · ${(p.updated_at||'').slice(0,16)}</span></div>`).join('')
}

function buildRows(items, customIds) {
    if (items.length === 0) return `<tr><td colspan="4" class="text-center py-6 text-gray-400">데이터 없음</td></tr>`
    return items.map(p => {
        const isCustom = customIds.has(p.package_id)
        const isActive = isCustom ? (p.is_active === 1 || p.is_active === true) : true
        return `
        <tr class="hover:bg-gray-50 transition" id="pkgrow-${p.package_id}">
            <td class="px-4 py-3 font-medium text-gray-800">${p.package_name}${isCustom ? '<span class="ml-1.5 px-1.5 py-0.5 bg-green-100 text-green-700 rounded text-xs">커스텀</span>' : ''}</td>
            <td class="px-4 py-3 text-right">
                <span id="pkg-display-${p.package_id}" class="text-blue-600 font-bold">₩${Number(p.price).toLocaleString('ko-KR')}</span>
                <input id="pkg-input-${p.package_id}" type="number" value="${p.price}" class="hidden w-32 text-right border border-blue-400 rounded-lg px-2 py-1 text-sm" min="0" step="1000">
            </td>
            <td class="px-4 py-3 text-center">
                ${isCustom ? `<button onclick="togglePkgActive('${p.package_id}')" class="px-2 py-1 text-xs rounded-lg font-semibold ${isActive ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}">${isActive ? '표시' : '숨김'}</button>` : '<span class="text-xs text-gray-400">기본</span>'}
            </td>
            <td class="px-4 py-3 text-center flex items-center justify-center gap-1 flex-wrap">
                <button id="pkg-btn-edit-${p.package_id}" onclick="startPkgEdit('${p.package_id}')" class="px-2.5 py-1.5 bg-blue-100 text-blue-700 rounded-lg text-xs font-semibold hover:bg-blue-200"><i class="fas fa-pencil-alt mr-0.5"></i>수정</button>
                <button id="pkg-btn-save-${p.package_id}" onclick="savePkgPrice('${p.package_id}')" class="hidden px-2.5 py-1.5 bg-green-500 text-white rounded-lg text-xs font-semibold hover:bg-green-600"><i class="fas fa-check mr-0.5"></i>저장</button>
                <button id="pkg-btn-cancel-${p.package_id}" onclick="cancelPkgEdit('${p.package_id}', ${p.price})" class="hidden px-2.5 py-1.5 bg-gray-200 text-gray-600 rounded-lg text-xs font-semibold hover:bg-gray-300">취소</button>
                ${isCustom ? `<button onclick="deleteCustomPkg('${p.package_id}', '${p.package_name}')" class="px-2.5 py-1.5 bg-red-100 text-red-600 rounded-lg text-xs font-semibold hover:bg-red-200"><i class="fas fa-trash"></i></button>` : ''}
            </td>
        </tr>`
    }).join('')
}

function startPkgEdit(pid) {
    document.getElementById(`pkg-display-${pid}`).classList.add('hidden')
    document.getElementById(`pkg-input-${pid}`).classList.remove('hidden')
    document.getElementById(`pkg-btn-edit-${pid}`).classList.add('hidden')
    document.getElementById(`pkg-btn-save-${pid}`).classList.remove('hidden')
    document.getElementById(`pkg-btn-cancel-${pid}`).classList.remove('hidden')
    document.getElementById(`pkg-input-${pid}`).focus()
}

function cancelPkgEdit(pid, origPrice) {
    document.getElementById(`pkg-display-${pid}`).classList.remove('hidden')
    document.getElementById(`pkg-input-${pid}`).classList.add('hidden')
    document.getElementById(`pkg-btn-edit-${pid}`).classList.remove('hidden')
    document.getElementById(`pkg-btn-save-${pid}`).classList.add('hidden')
    document.getElementById(`pkg-btn-cancel-${pid}`).classList.add('hidden')
    document.getElementById(`pkg-input-${pid}`).value = origPrice
}

async function savePkgPrice(pid) {
    const newPrice = parseInt(document.getElementById(`pkg-input-${pid}`).value)
    if (isNaN(newPrice) || newPrice < 0) { alert('올바른 가격을 입력해주세요.'); return }
    const customIds = new Set(allCustomPkgs.map(p => p.package_id))
    try {
        if (customIds.has(pid)) {
            const cp = allCustomPkgs.find(p => p.package_id === pid)
            await axios.put(`/api/custom-packages/${pid}`, { name: cp.name, fullName: cp.full_name, description: cp.description, price: newPrice, imageUrl: cp.image_url, isActive: cp.is_active })
        } else {
            await axios.put(`/api/packages/prices/${pid}`, { price: newPrice })
        }
        cancelPkgEdit(pid, newPrice)
        await loadAllPrices()
        renderProductTables()
        alert('✅ 가격이 수정되었습니다. 즉시 전 지사에 반영됩니다.')
    } catch(e) { alert('가격 저장 중 오류가 발생했습니다.') }
}

async function togglePkgActive(pid) {
    const cp = allCustomPkgs.find(p => p.package_id === pid)
    if (!cp) return
    const newActive = (cp.is_active === 1 || cp.is_active === true) ? 0 : 1
    try {
        await axios.put(`/api/custom-packages/${pid}`, { name: cp.name, fullName: cp.full_name, description: cp.description, price: cp.price, imageUrl: cp.image_url, isActive: newActive })
        await loadProductManagement()
        alert(`✅ ${cp.name} 을(를) ${newActive ? '표시' : '숨김'} 처리했습니다.`)
    } catch(e) { alert('처리 중 오류가 발생했습니다.') }
}

async function deleteCustomPkg(pid, name) {
    if (!confirm(`"${name}" 을(를) 삭제할까요?\n지사 2단계에서 즉시 사라집니다.`)) return
    try { await axios.delete(`/api/custom-packages/${pid}`); await loadProductManagement(); alert('✅ 삭제되었습니다.') }
    catch(e) { alert('삭제 중 오류가 발생했습니다.') }
}

function previewProductImage(input) {
    const file = input.files[0]; if (!file) return
    document.getElementById('np-image-label').textContent = file.name
    const reader = new FileReader()
    reader.onload = (e) => { document.getElementById('np-image-preview').src = e.target.result; document.getElementById('np-image-preview-wrap').classList.remove('hidden') }
    reader.readAsDataURL(file)
    document.getElementById('np-image-url').value = ''
    document.getElementById('np-image-status').textContent = '제품 등록 시 자동 업로드됩니다.'
    document.getElementById('np-image-status').classList.remove('hidden')
}

async function registerPackage() {
    const brand = document.getElementById('np-brand').value
    const name = document.getElementById('np-name').value.trim()
    const price = parseInt(document.getElementById('np-price').value)
    const desc = document.getElementById('np-desc').value.trim()
    const fileInput = document.getElementById('np-image-file')
    const multiSelect = document.getElementById('np-multi-select').checked
    if (!brand) { alert('카테고리를 선택해주세요.'); return }
    if (!name || isNaN(price)) { alert('제품명, 소비자가는 필수입니다.'); return }
    let imageUrl = ''
    if (fileInput.files[0]) {
        try {
            document.getElementById('np-image-status').textContent = '이미지 업로드 중...'
            document.getElementById('np-image-status').classList.remove('hidden')
            const formData = new FormData()
            formData.append('image', fileInput.files[0])
            const uploadRes = await axios.post('/api/upload/product-image', formData, { headers: { 'Content-Type': 'multipart/form-data' } })
            if (uploadRes.data.success) { imageUrl = uploadRes.data.imageUrl; document.getElementById('np-image-status').textContent = '✅ 이미지 업로드 완료' }
            else { document.getElementById('np-image-status').textContent = '⚠️ 이미지 업로드 실패 (제품은 등록됩니다)' }
        } catch(e) { document.getElementById('np-image-status').textContent = '⚠️ 이미지 업로드 실패 (제품은 등록됩니다)' }
    }
    try {
        const res = await axios.post('/api/custom-packages', { brand, name, fullName: name, description: desc, price, imageUrl, hasPositionOption: multiSelect })
        if (res.data.success) {
            document.getElementById('np-name').value = ''
            document.getElementById('np-price').value = ''
            document.getElementById('np-desc').value = ''
            document.getElementById('np-image-file').value = ''
            document.getElementById('np-image-label').textContent = '이미지 파일 선택'
            document.getElementById('np-image-preview-wrap').classList.add('hidden')
            document.getElementById('np-image-url').value = ''
            document.getElementById('np-image-status').classList.add('hidden')
            document.getElementById('np-multi-select').checked = false
            document.getElementById('np-brand-select').value = ''
            document.getElementById('np-brand').value = ''
            await loadProductManagement()
            alert(`✅ "${name}" 이(가) 등록되었습니다!\n즉시 전 지사 2단계에 표시됩니다.`)
        } else { alert('❌ ' + (res.data.error || '등록 실패')) }
    } catch(e) { alert('등록 중 오류: ' + (e.response?.data?.error || e.message)) }
}

async function loadPrices() { await loadProductManagement() }
async function initPrices() { await loadProductManagement() }
</script>
</body>
</html>
